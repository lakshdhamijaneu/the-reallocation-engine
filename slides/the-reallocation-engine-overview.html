    <h1 class="headline">Fluency is not correctness — and the check is yours.</h1>

    <div class="eyebrow">The core method · Chapter 2</div>
    <h1 class="headline">Spend scarce judgment where it changes the decision.</h1>
    <div class="body"><img src="../images/02-the-reallocation-principle-fig-01.png" alt="Reallocate effort from cheap execution to scarce judgment."></div>

    <h1 class="headline">Write each recipe twice: complete for the agent, summary for you.</h1>

    <div class="eyebrow">The core method · Chapter 5</div>
    <h1 class="headline">Real data isn't enough — ask if it measures the right thing.</h1>
    <div class="body"><img src="../images/05-verifying-the-data-fig-01.png" alt="The three-tier trust stack: build upward to trustworthy inference."></div>
    <div class="caption">The three-tier trust stack: build upward to trustworthy inference.</div>
    <aside class="notes">Numbers tracing to records is the floor. Above it sits the working question — are the right things being measured? — where coverage gaps and base-rate mismatch live.</aside>
  </section>
  <section class="slide" data-type="concept">
    <div class="eyebrow">The evidence components · Chapter 6</div>
    <h1 class="headline">Follow the funding: recent raises beat big names.</h1>
    <div class="body"><img src="../images/06-where-the-money-went-sec-form-d-fig-01.png" alt="SEC Form D surfaces who just raised money."></div>
    <div class="caption">SEC Form D surfaces who just raised money.</div>
    <aside class="notes">Companies that recently closed funding are hiring. Form D is the public record; the recipe ranks leads by recency and size, flagging the bigger-isn't-better cases.</aside>
  </section>
  <section class="slide" data-type="concept">
    <div class="eyebrow">The evidence components · Chapter 7</div>
    <h1 class="headline">Score who actually sponsors, not who's famous.</h1>

  </section>
  <section class="slide" data-type="concept">
    <div class="eyebrow">The evidence components · Chapter 8</div>
    <h1 class="headline">A posting isn't a job until it's proven live.</h1>

    <aside class="notes">Detecting an applicant-tracking system means the provider is present; liveness means the role is open today. They are different facts, and the recipe keeps them separate.</aside>
  </section>

    <h1 class="headline">Resolve the title to an occupation before you trust the pay.</h1>

  </section>

    <div class="eyebrow">The evidence components · Chapter 10</div>
    <h1 class="headline">The 90-day clock is a gate, not a vote.</h1>

  </section>
  <section class="slide" data-type="concept">
    <div class="eyebrow">The evidence components · Chapter 12</div>
    <h1 class="headline">Strategic framing is permitted; misrepresentation is not.</h1>

    <div class="eyebrow">Operating the engine · Chapter 14</div>

<div id="next"><div class="mini"></div></div>
<div id="bar"></div>
<div id="counter"></div>
<div id="timer" hidden>00:00</div>
<div id="help"><div>
  → / Space&nbsp; next &nbsp;·&nbsp; ← &nbsp; back &nbsp;·&nbsp; Home/End &nbsp; jump<br>
  f &nbsp; fullscreen &nbsp;·&nbsp; s &nbsp; presenter view &nbsp;·&nbsp; o &nbsp; overview &nbsp;·&nbsp; ? &nbsp; this help
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  let i = Math.max(0, (parseInt(location.hash.slice(1))||1) - 1);
  const bar = document.getElementById('counter');
  const prog = document.getElementById('bar');
  const nextMini = document.querySelector('#next .mini');

  function show(n){
    i = Math.max(0, Math.min(slides.length-1, n));
    slides.forEach((s,k)=>s.classList.toggle('current', k===i));
    bar.textContent = (i+1)+' / '+slides.length;
    prog.style.width = ((i+1)/slides.length*100)+'%';
    if(!document.body.classList.contains('study')) history.replaceState(null,'','#'+(i+1));
    if(document.body.classList.contains('presenter')){
      nextMini.innerHTML = slides[i+1] ? slides[i+1].innerHTML : '<em style="color:var(--color-secondary)">— end —</em>';
    }
  }
  function go(d){ show(i+d); }

  // presenter timer
  let t0=null, timer=document.getElementById('timer');
  setInterval(()=>{ if(t0){const s=Math.floor((Date.now()-t0)/1000);
    timer.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}},500);

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(1);}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(-1);}
    else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(slides.length-1);}
    else if(e.key==='f'){ if(!document.fullscreenElement)document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }
    else if(e.key==='s'){ document.body.classList.toggle('presenter'); if(!t0)t0=Date.now(); timer.hidden=!document.body.classList.contains('presenter'); show(i); }
    else if(e.key==='o'){ document.body.classList.toggle('overview'); }
    else if(e.key==='?'){ const h=document.getElementById('help'); h.style.display = h.style.display==='flex'?'none':'flex'; }
    else if(e.key==='Escape'){ document.getElementById('help').style.display='none'; document.body.classList.remove('overview'); }
  });
  document.getElementById('deck').addEventListener('click',e=>{
    if(document.body.classList.contains('overview')){ const s=e.target.closest('.slide'); if(s){show(slides.indexOf(s));document.body.classList.remove('overview');} }
  });
  document.querySelectorAll('.reveal>summary').forEach(su=>su.addEventListener('click',e=>{e.preventDefault();su.parentElement.classList.toggle('open');}));

  // study mode shows everything; live/presenter start at slide i
  if(!document.body.classList.contains('study')) show(i);

  // ---- example inline D3 figure (replace per slide; obey D3-CODING.md) ----
  (function(){
    const el=document.getElementById('ex-chart'); if(!el) return;
    const data=[{k:'Hand-coded',v:67,a:0},{k:'AI + interrogation',v:65,a:1},{k:'AI + delegation',v:38,a:0}];
    function draw(){
      el.innerHTML='';
      const w=el.clientWidth||700,h=el.clientHeight||300,m={t:24,r:20,b:48,l:44};
      const cw=w-m.l-m.r, ch=h-m.t-m.b;
      const svg=d3.select(el).append('svg').attr('width',w).attr('height',h)
        .attr('role','img').attr('aria-labelledby','exct excd');
      svg.append('title').attr('id','exct').text('Comprehension by how the tool was used');
      svg.append('desc').attr('id','excd').text('Hand-coding and AI-plus-interrogation are near-level; AI-plus-delegation drops off.');
      const css=getComputedStyle(document.documentElement);
      const ink=css.getPropertyValue('--color-ink').trim(), red=css.getPropertyValue('--color-red').trim(),
            sec=css.getPropertyValue('--color-secondary').trim(), gray='#787878';
      const g=svg.append('g').attr('transform',`translate(${m.l},${m.t})`);
      const x=d3.scaleBand().domain(data.map(d=>d.k)).range([0,cw]).padding(.25);
      const y=d3.scaleLinear().domain([0,100]).range([ch,0]);
      g.append('line').attr('x1',0).attr('x2',cw).attr('y1',ch).attr('y2',ch).attr('stroke',sec);
      g.selectAll('rect').data(data).join('rect')
        .attr('x',d=>x(d.k)).attr('y',d=>y(d.v)).attr('width',x.bandwidth())
        .attr('height',d=>ch-y(d.v)).attr('fill',d=>d.a?red:gray);
      g.selectAll('.v').data(data).join('text').attr('class','v')
        .attr('x',d=>x(d.k)+x.bandwidth()/2).attr('y',d=>y(d.v)-6).attr('text-anchor','middle')
        .attr('font-family',"var(--mono)").attr('font-size',12).attr('fill',sec).text(d=>d.v+'%');
      g.selectAll('.k').data(data).join('text').attr('class','k')
        .attr('x',d=>x(d.k)+x.bandwidth()/2).attr('y',ch+20).attr('text-anchor','middle')
        .attr('font-family',"var(--sans)").attr('font-size',12).attr('fill',ink).text(d=>d.k);
    }
    draw(); new ResizeObserver(draw).observe(el);
  })();
</script>
</body>
</html>
